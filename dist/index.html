<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1976d2" />
    <title>PRODE</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="stylesheet" crossorigin href="/assets/index-B2lWWCJa.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- ✅ REGISTRO SERVICE WORKER 100% MANUAL - NO DEPENDE DE NINGUN PLUGIN -->
    <script>
      window.addEventListener('load', async () => {
        console.log('🔍 Iniciando chequeo PWA...')

        // Chequear Manifiesto
        if ('manifest' in document) {
          console.log('✅ Manifest detectado correctamente')
        } else {
          console.warn('⚠️ Manifest no detectado')
        }

        // Registrar Service Worker MANUALMENTE (la unica forma que funciona)
        if ('serviceWorker' in navigator) {
          try {
            // ✅ Service Worker ESTATICO que SI EXISTE y SI FUNCIONA
            const swPath = window.location.origin + '/sw-push.js'
            
            const registration = await navigator.serviceWorker.register(swPath, {
              scope: '/'
            })

            console.log('✅ ✅ ✅ SERVICE WORKER REGISTRADO EXITOSAMENTE!')
            console.log('✅ Scope:', registration.scope)
            console.log('✅ Estado:', registration.active ? 'ACTIVO' : 'Cargando...')

            registration.addEventListener('updatefound', () => {
              console.log('✅ Nueva version de la app disponible!')
            })

          } catch (error) {
            console.error('❌ Error al registrar Service Worker:')
            console.error('❌ Mensaje:', error.message)
            console.error('❌ Codigo:', error.code)
          }
        } else {
          console.warn('⚠️ Service Worker no soportado en este navegador')
        }
      })
    </script>

  </body>
</html>
